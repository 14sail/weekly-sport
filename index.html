<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
  import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  // Your web app's Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyCgUDmlcV3PpiGdB989ba9FgFR637_ZKnA",
    authDomain: "weekly-sport.firebaseapp.com",
    databaseURL: "https://weekly-sport-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "weekly-sport",
    storageBucket: "weekly-sport.firebasestorage.app",
    messagingSenderId: "877154842539",
    appId: "1:877154842539:web:83b4500eaa33ca46fb44ee"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  window.db = getDatabase(app);
  window.dbRef = ref;
  window.dbGet = get;
  window.dbSet = set;

  // 匿名登入：讓 Realtime Database 規則可以要求 "auth != null"，
  // 擋掉單純拿 apiKey 直接打 REST API 的存取，登入過程對使用者無感。
  signInAnonymously(auth)
    .catch((e)=>console.error('anonymous sign-in failed', e))
    .finally(()=>{
      window.firebaseReady = true;
      document.dispatchEvent(new Event('firebase-ready'));
    });
</script>

<style>

<body>

<div class="switch-user edit-profile" id="editProfileBtn" style="display:none;">修改資料</div>
<div class="switch-user" id="switchUserBtn" style="display:none;">切換身份</div>

<div class="wrap" id="app">
  <header class="top">
    <div class="brand"><span class="seed">●</span> 本週運動 <span class="seed">●</span></div>
    <div class="sub">WEEKLY MOVEMENT</div>
  </header>
  <div class="loading">載入中…</div>
</div>

<script>
(function(){

  // ---------- 基本設定 ----------
  // 管理密碼改存 SHA-256 雜湊值，原始碼裡看不到明碼。
  // 更換密碼方式：在瀏覽器 devtools console 執行（把「新密碼」換成你要的密碼）：
  //   crypto.subtle.digest('SHA-256', new TextEncoder().encode('新密碼')).then(b=>console.log([...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('')))
  // 再把印出的字串貼到下面 ADMIN_PASSWORD_HASH。
  const ADMIN_PASSWORD_HASH = "2a0affece715fcb62b31c2e8f37027b53a9ef886d104959493cc4a061c5ea30e";
  async function sha256Hex(text){
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
    return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
  }
  const STATUS_OPTS = [
    {v:'free', label:'有空'},
    {v:'maybe', label:'不確定'},
    {v:'busy', label:'沒空'}
  ];
  const WEEKDAY_NAMES = ['日','一','二','三','四','五','六'];

  let people = [];       // [{id, name, isTeacher, password}]
  let currentPersonId = null;
  let view = 'loading';  // loading | pickPerson | setPassword | enterPassword | member | teacher | admin
  let teacherTab = 'summary'; // summary | announce (老師視角內部切換用)
  let pendingPersonId = null; // 選了名字但還沒通過密碼驗證時暫存

  const app = document.getElementById('app');
  const switchBtn = document.getElementById('switchUserBtn');
  const editProfileBtn = document.getElementById('editProfileBtn');

  // ---------- 工具：日期 ----------
  function pad(n){ return n<10 ? '0'+n : ''+n; }
  function toKey(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
  function fmtShort(d){ return (d.getMonth()+1)+'/'+d.getDate(); }
  function startOfWeek(d){
    // 週一為一週開始
    const day = d.getDay(); // 0=日
    const diff = (day===0 ? -6 : 1-day);
    const monday = new Date(d);
    monday.setDate(d.getDate()+diff);
    monday.setHours(0,0,0,0);
    return monday;
  }
  function addDays(d, n){ const r = new Date(d); r.setDate(r.getDate()+n); return r; }

  // 產生未來4週(含本週)，每週週一到週五
  function getWeeks(){
    const today = new Date();
    const thisMonday = startOfWeek(today);
    const weeks = [];
    for(let w=0; w<4; w++){
      const monday = addDays(thisMonday, w*7);
      const days = [];
      for(let i=0;i<5;i++){
        const d = addDays(monday, i);
        days.push({ key: toKey(d), date: d, weekdayName: WEEKDAY_NAMES[d.getDay()] });
      }
      weeks.push({ weekKey: toKey(monday), monday, days, isCurrent: w===0 });
    }
    return weeks;
  }
  const WEEKS = getWeeks();
  const CURRENT_WEEK = WEEKS[0];

  // ---------- Storage helpers (Firebase Realtime Database) ----------
  // key 中的 '.' '#' '$' '[' ']' 對 Firebase path 是保留字元，做安全轉換
  function safeKey(key){
    return key.replace(/[.#$\[\]]/g, '_');
  }
  async function sGet(key, shared){
    try{
      const snap = await window.dbGet(window.dbRef(window.db, 'data/' + safeKey(key)));
      if(!snap.exists()) return null;
      return JSON.parse(snap.val());
    }catch(e){ console.error('sGet error', e); return null; }
  }
  async function sSet(key, val, shared){
    try{
      await window.dbSet(window.dbRef(window.db, 'data/' + safeKey(key)), JSON.stringify(val));
    }catch(e){ console.error('sSet error', e); }
  }
  async function sDelete(key, shared){
    try{
      await window.dbSet(window.dbRef(window.db, 'data/' + safeKey(key)), null);
    }catch(e){ console.error('sDelete error', e); }
  }
  async function sList(prefix, shared){
    try{
      const snap = await window.dbGet(window.dbRef(window.db, 'data'));
      if(!snap.exists()) return [];
      const all = snap.val();
      const safePrefix = safeKey(prefix);
      return Object.keys(all).filter(k => k.startsWith(safePrefix));
    }catch(e){ console.error('sList error', e); return []; }
  }

  // ---------- 資料模型 ----------
  // people (shared): key "people-list" -> [{id,name,isTeacher}]
  // responses (shared): key "resp:<weekKey>:<personId>" -> {statuses:{dayKey:'free'|'busy'|'maybe'}, note:''}
  // announcement (shared): key "announce:<weekKey>" -> {dayKey, sport, note, savedAt}

  async function loadPeople(){
    const p = await sGet('people-list', true);
    if(p && Array.isArray(p) && p.length){ people = p; }
    else{
      // 預設種子資料
      people = [
        {id:'p1', name:'老師', isTeacher:true, password:''},
        {id:'p2', name:'同學A', isTeacher:false, password:''},
        {id:'p3', name:'同學B', isTeacher:false, password:''}
      ];
      await sSet('people-list', people, true);
    }
  }

  async function savePeople(){
    await sSet('people-list', people, true);
  }

  async function cleanupOldWeeks(){
    // 刪除比本週還早的回覆資料
    const keys = await sList('resp:', true);
    const validPrefixes = WEEKS.map(w => 'resp:'+w.weekKey+':');
    for(const k of keys){
      const isValid = validPrefixes.some(p => k.startsWith(p));
      if(!isValid){ await sDelete(k, true); }
    }
    const akeys = await sList('announce:', true);
    const validA = WEEKS.map(w => 'announce:'+w.weekKey);
    for(const k of akeys){
      if(!validA.includes(k)){ await sDelete(k, true); }
    }
  }

  // ---------- Render 進入點 ----------
  function waitForFirebase(){
    return new Promise((resolve)=>{
      if(window.firebaseReady){ resolve(); return; }
      document.addEventListener('firebase-ready', ()=>resolve(), {once:true});
      // 保險：3秒後即使沒收到事件也嘗試繼續（避免卡死在載入畫面）
      setTimeout(()=>resolve(), 3000);
    });
  }

  async function init(){
    await waitForFirebase();
    if(!window.db){
      app.innerHTML = `
        <header class="top">
          <div class="brand"><span class="seed">●</span> 本週運動 <span class="seed">●</span></div>
        </header>
        <div class="card">
          <h1>資料庫尚未設定</h1>
          <p class="desc">請先在 index.html 檔案開頭填入你的 Firebase 設定值（firebaseConfig），才能開始使用。</p>
        </div>
      `;
      return;
    }
    await loadPeople();
    await cleanupOldWeeks();
    view = 'pickPerson';
    render();
  }

  function render(){
    const loggedIn = (view==='member' || view==='teacher');
    switchBtn.style.display = loggedIn ? 'block' : 'none';
    editProfileBtn.style.display = loggedIn ? 'block' : 'none';
    if(view==='pickPerson') return renderPickPerson();
    if(view==='setPassword') return renderSetPassword();
    if(view==='enterPassword') return renderEnterPassword();
    if(view==='editProfile') return renderEditProfile();
    if(view==='member') return renderMember();
    if(view==='teacher') return renderTeacher();
    if(view==='admin') return renderAdminLock();
  }

  let returnViewAfterEdit = 'pickPerson';
  editProfileBtn.addEventListener('click', ()=>{
    returnViewAfterEdit = view;
    view = 'editProfile';
    render();
  });

  switchBtn.addEventListener('click', ()=>{
    currentPersonId = null;
    view = 'pickPerson';
    render();
  });

  // ---------- 畫面：選擇使用者 ----------
  function renderPickPerson(){
    const teacher = people.find(p=>p.isTeacher);
    const students = people.filter(p=>!p.isTeacher);
    let html = `
      <header class="top">
        <div class="brand"><span class="seed">●</span> 本週運動 <span class="seed">●</span></div>
        <div class="sub">WEEKLY MOVEMENT</div>
      </header>
      <div class="card">
        <h1>你是哪位同學？</h1>
        <p class="desc">請選擇你的名字，就可以填寫接下來不方便運動的時間囉！</p>
        <div class="people-grid">
    `;
    if(teacher){
      html += `<div class="person-btn teacher" data-id="${teacher.id}">${escapeHtml(teacher.name)}<br><span style="font-size:10px;">（我是老師）</span></div>`;
    }
    students.forEach(s=>{
      html += `<div class="person-btn" data-id="${s.id}">${escapeHtml(s.name)}</div>`;
    });
    html += `
        </div>
      </div>
      <div class="footer-link"><a href="#" id="adminEntry">管理入口</a></div>
    `;
    app.innerHTML = html;

    app.querySelectorAll('.person-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        pendingPersonId = btn.dataset.id;
        const person = people.find(p=>p.id===pendingPersonId);
        view = person.password ? 'enterPassword' : 'setPassword';
        render();
      });
    });
    document.getElementById('adminEntry').addEventListener('click', (e)=>{
      e.preventDefault();
      view = 'admin';
      render();
    });
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // ---------- 畫面：第一次使用，設定名字與密碼 ----------
  function renderSetPassword(){
    const person = people.find(p=>p.id===pendingPersonId);
    if(!person){ view='pickPerson'; return render(); }

    app.innerHTML = `
      <header class="top">
        <div class="brand"><span class="seed">●</span> 本週運動 <span class="seed">●</span></div>
        <div class="sub">第一次使用，請設定密碼</div>
      </header>
      <div class="card admin-lock">
        <div class="lock-icon">設定</div>

  // ---------- 畫面：老師檢視 ----------
  let teacherSelectedWeekIdx = 0;

  async function renderTeacher(){
    const person = people.find(p=>p.id===currentPersonId);
    if(!person){ view='pickPerson'; return render(); }

    app.innerHTML = `
      <header class="top">
        <div class="brand"><span class="seed">●</span> 本週運動 <span class="seed">●</span></div>
        <div class="sub">老師管理視角</div>
      </header>
      <div class="card"><div class="empty">載入統計中…</div></div>
    `;

    const week = WEEKS[teacherSelectedWeekIdx];

    // 撈這週所有人的回覆
    const allResp = {};
    for(const p of people){
      const key = 'resp:'+week.weekKey+':'+p.id;
      const r = await sGet(key, true);
      if(r) allResp[p.id] = r;
    }
    const teacherResp = allResp[person.id] || {statuses:{}, note:''};
    const savedAnnounce = await sGet('announce:'+week.weekKey, true);

    // 計算每天統計
    const dayStats = week.days.map(d=>{
      const freeList=[], busyList=[], maybeList=[], noAnswerList=[];
      people.forEach(p=>{
        if(p.isTeacher) return;
        const st = allResp[p.id] ? allResp[p.id].statuses[d.key] : null;
        if(st==='free') freeList.push(p);
        else if(st==='busy') busyList.push(p);
        else if(st==='maybe') maybeList.push(p);
        else noAnswerList.push(p);
      });
      const teacherStatus = teacherResp.statuses[d.key] || null;
      const teacherOk = teacherStatus === 'free' || teacherStatus === 'maybe';
      return { day:d, freeList, busyList, maybeList, noAnswerList, teacherStatus, teacherOk };
    });

    // 找出建議日：老師可以(free) 且 free人數最多
    let bestKey = null, bestScore = -1;
    dayStats.forEach(ds=>{
      if(ds.teacherStatus==='free'){
        const score = ds.freeList.length;
        if(score>bestScore){ bestScore=score; bestKey=ds.day.key; }
      }
    });

    let tabsHtml = '<div class="nav-tabs">';
    WEEKS.forEach((w,i)=>{
      const label = i===0 ? '本週' : (fmtShort(w.monday)+'週');
      tabsHtml += `<button data-idx="${i}" class="${i===teacherSelectedWeekIdx?'active':''}">${label}</button>`;
    });
    tabsHtml += '</div>';

    let subTabsHtml = `
      <div class="nav-tabs">
        <button data-tab="summary" class="${teacherTab==='summary'?'active':''}">統計總覽</button>
        <button data-tab="fill" class="${teacherTab==='fill'?'active':''}">填寫我的時間</button>
        <button data-tab="announce" class="${teacherTab==='announce'?'active':''}">公告產生</button>
      </div>
    `;

    let bodyHtml = '';
    if(teacherTab==='summary'){
      bodyHtml += `<h2>${fmtShort(week.monday)} - ${fmtShort(week.days[4].date)} 統計</h2>`;
      if(!teacherResp.statuses || Object.keys(teacherResp.statuses).length===0){
        bodyHtml += `<p class="desc" style="color:var(--red);">你（老師）尚未填寫這週有空的時間，請切換到「填寫我的時間」分頁填寫。</p>`;
      }
      dayStats.forEach(ds=>{
        const isBest = ds.day.key === bestKey;
        const teacherBadge = ds.teacherStatus==='free' ? '<span class="badge best">老師可以</span>'
          : ds.teacherStatus==='maybe' ? '<span class="badge normal">老師不確定</span>'
          : ds.teacherStatus==='busy' ? '<span class="badge noteacher">老師沒空</span>'
          : '<span class="badge noteacher">老師未填</span>';
        bodyHtml += `
          <div class="summary-day ${isBest?'picked':''} ${!ds.teacherOk?'teacher-no':''}">
            <div class="summary-head">
              <div class="d">星期${ds.day.weekdayName} ${fmtShort(ds.day.date)} ${isBest?'（建議）':''}</div>
              ${teacherBadge}
            </div>
            <div class="summary-names">
              <b>有空 ${ds.freeList.length}</b>：
              ${ds.freeList.map(p=>`<span class="name-tag free">${escapeHtml(p.name)}</span>`).join('') || '—'}
              <br><b>不確定 ${ds.maybeList.length}</b>：
              ${ds.maybeList.map(p=>`<span class="name-tag maybe">${escapeHtml(p.name)}</span>`).join('') || '—'}
              <br><b>沒空 ${ds.busyList.length}</b>：
              ${ds.busyList.map(p=>`<span class="name-tag busy">${escapeHtml(p.name)}</span>`).join('') || '—'}
              ${ds.noAnswerList.length ? `<br><span style="color:#B6A88E;">尚未回覆：${ds.noAnswerList.map(p=>escapeHtml(p.name)).join('、')}</span>` : ''}
            </div>
          </div>
        `;
      });
      // 備註彙整
      const notes = people.filter(p=>!p.isTeacher).map(p=>{
        const r = allResp[p.id];
        return (r && r.note) ? {name:p.name, note:r.note} : null;
      }).filter(Boolean);
      if(notes.length){
        bodyHtml += `<div class="note-label">學員備註</div>`;
        notes.forEach(n=>{
          bodyHtml += `<div class="note-line">${escapeHtml(n.name)}：${escapeHtml(n.note)}</div>`;
        });
      }
    } else if(teacherTab==='fill'){
      // 老師填寫自己這週的可用時間（跟成員畫面邏輯相同，寫回同一份 resp 資料）
      bodyHtml += `<h2>${fmtShort(week.monday)} - ${fmtShort(week.days[4].date)}</h2>`;
      bodyHtml += `<p class="desc">請針對每天勾選「有空 / 不確定 / 沒空」，這會作為排定運動的必要條件。</p>`;
      week.days.forEach(d=>{
        const cur = teacherResp.statuses[d.key] || '';
        bodyHtml += `
          <div class="day-row">
            <div class="day-label">星期${d.weekdayName}<span class="date">${fmtShort(d.date)}</span></div>
            <div class="status-options" data-day="${d.key}">
              ${STATUS_OPTS.map(o=>`<div class="status-btn" data-v="${o.v}" data-day="${d.key}">${o.label}</div>`).join('')}
            </div>
          </div>
        `;
      });
      bodyHtml += `<div class="note-label">備註（選填）</div>`;
      bodyHtml += `<textarea class="note" id="teacherNoteInput" placeholder="例如：這週想打羽球、或身體微恙先觀望…">${escapeHtml(teacherResp.note||'')}</textarea>`;
      bodyHtml += `<button class="save-btn" id="teacherSaveBtn">儲存這週的回覆</button>`;
      bodyHtml += `<div class="save-flash" id="teacherSaveFlash"></div>`;
    } else {
      // 公告產生
      bodyHtml += `<h2>產生公告</h2>`;
      bodyHtml += `<div class="field"><label>選擇日期</label><select id="announceDay">`;
      week.days.forEach(d=>{
        const ds = dayStats.find(x=>x.day.key===d.key);
        const sel = savedAnnounce && savedAnnounce.dayKey===d.key;
        bodyHtml += `<option value="${d.key}" ${sel?'selected':''}>星期${d.weekdayName} ${fmtShort(d.date)}（有空${ds.freeList.length}人）</option>`;
      });
      bodyHtml += `</select></div>`;
      bodyHtml += `<div class="field"><label>時間</label><input type="text" id="announceTime" placeholder="例如 19:00-20:00" value="${escapeHtml(savedAnnounce ? savedAnnounce.time||'' : '19:00-20:00')}"></div>`;
      bodyHtml += `<div class="field"><label>運動項目</label><input type="text" id="announceSport" placeholder="例如 羽毛球" value="${escapeHtml(savedAnnounce ? savedAnnounce.sport||'' : '')}"></div>`;
      bodyHtml += `<div class="field"><label>附加提醒（選填）</label><input type="text" id="announceExtra" placeholder="例如 請自備球拍" value="${escapeHtml(savedAnnounce ? savedAnnounce.extra||'' : '')}"></div>`;
      bodyHtml += `<button class="save-btn" id="genBtn">產生 / 更新公告文字</button>`;
      bodyHtml += `<div class="note-label">公告文字（可自行編輯後再複製）</div>`;
      bodyHtml += `<textarea class="announce-box" id="announceBox">${savedAnnounce ? buildAnnounceText(savedAnnounce, dayStats) : '尚未產生公告，請選擇日期與運動後按上方按鈕。'}</textarea>`;
      bodyHtml += `<button class="copy-btn" id="copyBtn">複製公告文字</button>`;
      bodyHtml += `<div class="save-flash" id="copyFlash"></div>`;
    }

    app.innerHTML = `
      <header class="top">
        <div class="brand"><span class="seed">●</span> 本週運動 <span class="seed">●</span></div>
        <div class="sub">老師管理視角</div>
      </header>
      <div class="card">
        ${tabsHtml}
        ${subTabsHtml}
        ${bodyHtml}
      </div>
      <div class="footer-link"><a href="#" id="backLink">回到選擇身份</a></div>
    `;

    app.querySelectorAll('.nav-tabs button[data-idx]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        teacherSelectedWeekIdx = parseInt(btn.dataset.idx,10);
        renderTeacher();
      });
    });
    app.querySelectorAll('.nav-tabs button[data-tab]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        teacherTab = btn.dataset.tab;
        renderTeacher();
      });
    });

    if(teacherTab==='fill'){
      const state = Object.assign({}, teacherResp.statuses);
      function refreshActive(){
        app.querySelectorAll('.status-btn').forEach(btn=>{
          const day = btn.dataset.day;
          btn.classList.toggle('active', state[day]===btn.dataset.v);
        });
      }
      refreshActive();
      app.querySelectorAll('.status-btn').forEach(btn=>{
        btn.addEventListener('click', ()=>{
          const day = btn.dataset.day;
          state[day] = btn.dataset.v;
          refreshActive();
        });
      });
      document.getElementById('teacherSaveBtn').addEventListener('click', async ()=>{
        const note = document.getElementById('teacherNoteInput').value.trim();
        await sSet('resp:'+week.weekKey+':'+person.id, {statuses: state, note: note}, true);
        const flash = document.getElementById('teacherSaveFlash');
        flash.textContent = '已儲存';
        setTimeout(()=>{ if(flash) flash.textContent=''; }, 2000);
      });
    }

    if(teacherTab==='announce'){
      document.getElementById('genBtn').addEventListener('click', async ()=>{
        const dayKey = document.getElementById('announceDay').value;
        const time = document.getElementById('announceTime').value.trim();
        const sport = document.getElementById('announceSport').value.trim();
        const extra = document.getElementById('announceExtra').value.trim();
        const data = {dayKey, time, sport, extra, savedAt: new Date().toISOString()};
        await sSet('announce:'+week.weekKey, data, true);
        document.getElementById('announceBox').value = buildAnnounceText(data, dayStats);
      });
      document.getElementById('copyBtn').addEventListener('click', ()=>{
        const text = document.getElementById('announceBox').value;
        copyToClipboard(text);
        const flash = document.getElementById('copyFlash');
        flash.textContent = '已複製，貼到 LINE 群組吧';
        setTimeout(()=>{ if(flash) flash.textContent=''; }, 2500);
      });
    }

    document.getElementById('backLink').addEventListener('click', (e)=>{
      e.preventDefault();
      currentPersonId = null;
      view = 'pickPerson';
      render();
    });
  }

  function buildAnnounceText(data, dayStats){
    const ds = dayStats.find(x=>x.day.key===data.dayKey);
    const dateLabel = ds ? `${fmtShort(ds.day.date)}（週${ds.day.weekdayName}）` : '';
    let text = `本週運動公告\n`;
    text += `日期：${dateLabel}\n`;
    if(data.time) text += `時間：${data.time}\n`;
    text += `運動：${data.sport || '（未填）'}\n`;
    if(data.extra) text += `備註：${data.extra}\n`;
    text += `請大家準時參加！`;
    return text;
  }

  function copyToClipboard(text){
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).catch(()=>{ fallbackCopy(text); });
    } else {
      fallbackCopy(text);
    }
  }
  function fallbackCopy(text){
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta);
    ta.select();
    try{ document.execCommand('copy'); }catch(e){}
    document.body.removeChild(ta);
  }

        <div class="field" style="margin-top:16px;">
          <input type="password" id="pwInput" placeholder="密碼">
        </div>
        <button class="save-btn" id="pwSubmit">進入管理</button>
        <div class="save-flash" id="pwFlash"></div>
      </div>
      <div class="footer-link"><a href="#" id="backLink">回到選擇身份</a></div>
    `;
    document.getElementById('pwSubmit').addEventListener('click', async ()=>{
      const val = document.getElementById('pwInput').value;
      const hash = await sha256Hex(val);
      if(hash === ADMIN_PASSWORD_HASH){
        adminUnlocked = true;
        renderAdminPanel();
      } else {
        document.getElementById('pwFlash').textContent = '密碼錯誤';
      }
    });
    document.getElementById('backLink').addEventListener('click', (e)=>{
      e.preventDefault();
      view='pickPerson'; render();
    });
  }

  function renderAdminPanel(){
    let rowsHtml = people.map(p=>`
      <div class="admin-row">
        <div>${escapeHtml(p.name)} ${p.isTeacher?'<span class="pill">老師</span>':''}
          <div style="font-size:11px; color:var(--ink-soft); margin-top:2px;">${p.password ? '已設定密碼' : '尚未設定密碼'}</div>
        </div>
        <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:flex-end;">
          <button class="del-btn" data-action="setTeacher" data-id="${p.id}">${p.isTeacher?'取消老師':'設為老師'}</button>
          ${p.password ? `<button class="del-btn" data-action="resetPw" data-id="${p.id}">重設密碼</button>` : ''}
          <button class="del-btn" data-action="delete" data-id="${p.id}">刪除</button>
        </div>
      </div>
    `).join('');

    app.innerHTML = `
      <header class="top">
        <div class="brand"><span class="seed">●</span> 本週運動 <span class="seed">●</span></div>
        <div class="sub">管理人員名單</div>
      </header>
      <div class="card">
        <h1>人員管理</h1>
        <p class="desc">新增成員、指定誰是老師。老師的可用時間會作為排定運動的必要條件。</p>
        ${rowsHtml || '<div class="empty">尚無人員</div>'}
        <div class="add-row">
          <input type="text" id="newName" placeholder="輸入新成員姓名">
          <button id="addBtn">新增</button>
        </div>
      </div>
      <div class="footer-link"><a href="#" id="backLink">回到選擇身份</a></div>
    `;

    app.querySelectorAll('[data-action="delete"]').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        if(!confirm('確定要刪除這位成員嗎？')) return;
        people = people.filter(p=>p.id!==btn.dataset.id);
        await savePeople();
        renderAdminPanel();
      });
    });
    app.querySelectorAll('[data-action="setTeacher"]').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        const id = btn.dataset.id;
        people = people.map(p=>({...p, isTeacher: p.id===id ? !p.isTeacher : false}));
        await savePeople();
        renderAdminPanel();
      });
    });
    app.querySelectorAll('[data-action="resetPw"]').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        const id = btn.dataset.id;
        const p = people.find(x=>x.id===id);
        if(!confirm(`確定要重設 ${p.name} 的密碼嗎？對方下次登入時會需要重新設定新密碼。`)) return;
        people = people.map(x=> x.id===id ? {...x, password:''} : x);
        await savePeople();
        renderAdminPanel();
      });
    });
    document.getElementById('addBtn').addEventListener('click', async ()=>{
      const input = document.getElementById('newName');
      const name = input.value.trim();
      if(!name) return;
      const id = 'p' + Date.now();
      people.push({id, name, isTeacher:false, password:''});
      await savePeople();
      renderAdminPanel();
    });
    document.getElementById('backLink').addEventListener('click', (e)=>{
      e.preventDefault();
      adminUnlocked = false;
      view='pickPerson'; render();
    });
  }

  init();
})();
</script>
</body>
</html>
