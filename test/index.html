    projectId: "weekly-sport-test",

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  window.db = getDatabase(app);
  window.dbRef = ref;
  window.dbGet = get;
  window.dbSet = set;

  // 匿名登入：讓 Realtime Database 規則可以要求 "auth != null"，
  // 擋掉單純拿 apiKey 直接打 REST API 的存取，登入過程對使用者無感。
  signInAnonymously(auth)

      document.dispatchEvent(new Event('firebase-ready'));
    });
</script>

<body>

<div class="switch-user edit-profile" id="editProfileBtn" style="display:none;">修改資料</div>
<div class="switch-user" id="switchUserBtn" style="display:none;">回首頁</div>

<div class="wrap" id="app">
  <header class="top">
    <div class="brand"><span class="seed">●</span> 本週運動 <span class="seed">●</span></div>
    <div class="sub">WEEKLY MOVEMENT</div>
  </header>
  <div class="loading">載入中…</div>
</div>

<script>
(function(){

  // ---------- 基本設定 ----------
  // 管理密碼改存 SHA-256 雜湊值，原始碼裡看不到明碼。
  // 更換密碼方式：在瀏覽器 devtools console 執行（把「新密碼」換成你要的密碼）：
  //   crypto.subtle.digest('SHA-256', new TextEncoder().encode('新密碼')).then(b=>console.log([...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('')))
  // 再把印出的字串貼到下面 ADMIN_PASSWORD_HASH。
  const ADMIN_PASSWORD_HASH = "2a0affece715fcb62b31c2e8f37027b53a9ef886d104959493cc4a061c5ea30e";
  async function sha256Hex(text){
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
    return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
  }
  const STATUS_OPTS = [
    {v:'free', label:'有空'},
    {v:'maybe', label:'不確定'},
    {v:'busy', label:'沒空'}
  ];
  const WEEKDAY_NAMES = ['日','一','二','三','四','五','六'];

  let people = [];       // [{id, name, isTeacher, password}]
  let currentPersonId = null;
  let view = 'loading';  // loading | pickPerson | setPassword | enterPassword | member | teacher | teacherPeek | admin
  let teacherTab = 'summary'; // summary | fill | announce | sports (老師視角內部切換用)
  let pendingPersonId = null; // 選了名字但還沒通過密碼驗證時暫存
  let renderGen = 0; // 每次渲染都會遞增；用來偵測「這次非同步渲染是不是已經被更新的操作取代了」，避免舊的畫面在新的畫面之後才蓋回去

  const app = document.getElementById('app');
  const switchBtn = document.getElementById('switchUserBtn');
  const editProfileBtn = document.getElementById('editProfileBtn');

  // ---------- 工具：日期 ----------
  function pad(n){ return n<10 ? '0'+n : ''+n; }
  function toKey(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
  function fmtShort(d){ return (d.getMonth()+1)+'/'+d.getDate(); }
  function fmtDateTime(iso){
    if(!iso) return '';
    const d = new Date(iso);
    return fmtShort(d)+' '+pad(d.getHours())+':'+pad(d.getMinutes());
  }
  function startOfWeek(d){
    // 週一為一週開始
    const day = d.getDay(); // 0=日
    const diff = (day===0 ? -6 : 1-day);
    const monday = new Date(d);
    monday.setDate(d.getDate()+diff);
    monday.setHours(0,0,0,0);
    return monday;
  }
  function addDays(d, n){ const r = new Date(d); r.setDate(r.getDate()+n); return r; }

  // 產生未來4週(含本週)，每週週一到週五
  function getWeeks(){
    const today = new Date();
    const thisMonday = startOfWeek(today);
    const weeks = [];
    for(let w=0; w<4; w++){
      const monday = addDays(thisMonday, w*7);
      const days = [];
      for(let i=0;i<5;i++){
        const d = addDays(monday, i);
        days.push({ key: toKey(d), date: d, weekdayName: WEEKDAY_NAMES[d.getDay()] });
      }
      weeks.push({ weekKey: toKey(monday), monday, days, isCurrent: w===0 });
    }
    return weeks;
  }
  const WEEKS = getWeeks();
  const CURRENT_WEEK = WEEKS[0];

  // ---------- Storage helpers (Firebase Realtime Database) ----------
  // key 中的 '.' '#' '$' '[' ']' 對 Firebase path 是保留字元，做安全轉換
  function safeKey(key){
    return key.replace(/[.#$\[\]]/g, '_');
  }
  async function sGet(key, shared){
    try{
      const snap = await window.dbGet(window.dbRef(window.db, 'data/' + safeKey(key)));
      if(!snap.exists()) return null;
      return JSON.parse(snap.val());
    }catch(e){ console.error('sGet error', e); return null; }
  }
  async function sSet(key, val, shared){
    try{
      await window.dbSet(window.dbRef(window.db, 'data/' + safeKey(key)), JSON.stringify(val));
    }catch(e){ console.error('sSet error', e); }
  }
  async function sDelete(key, shared){
    try{
      await window.dbSet(window.dbRef(window.db, 'data/' + safeKey(key)), null);
    }catch(e){ console.error('sDelete error', e); }
  }
  async function sList(prefix, shared){
    try{
      const snap = await window.dbGet(window.dbRef(window.db, 'data'));
      if(!snap.exists()) return [];
      const all = snap.val();
      const safePrefix = safeKey(prefix);
      return Object.keys(all).filter(k => k.startsWith(safePrefix));
    }catch(e){ console.error('sList error', e); return []; }
  }

  // ---------- 資料模型 ----------
  // people (shared): key "people-list" -> [{id,name,isTeacher}]
  // responses (shared): key "resp:<weekKey>:<personId>" -> {statuses:{dayKey:'free'|'busy'|'maybe'}, note:''}
  // announcement (shared): key "announce:<weekKey>" -> {dayKey, sport, note, savedAt}

  async function loadPeople(){
    const p = await sGet('people-list', true);
    if(p && Array.isArray(p) && p.length){ people = p; }
    else{
      // 預設種子資料
      people = [
        {id:'p1', name:'老師', isTeacher:true, password:''},
        {id:'p2', name:'同學A', isTeacher:false, password:''},
        {id:'p3', name:'同學B', isTeacher:false, password:''}
      ];
      await sSet('people-list', people, true);
    }
  }

  async function savePeople(){
    await sSet('people-list', people, true);
  }

  async function cleanupOldWeeks(){
    // 刪除比本週還早的回覆資料
    const keys = await sList('resp:', true);
    const validPrefixes = WEEKS.map(w => 'resp:'+w.weekKey+':');
    for(const k of keys){
      const isValid = validPrefixes.some(p => k.startsWith(p));
      if(!isValid){ await sDelete(k, true); }
    }
    const akeys = await sList('announce:', true);
    const validA = WEEKS.map(w => 'announce:'+w.weekKey);
    for(const k of akeys){
      if(!validA.includes(k)){ await sDelete(k, true); }
    }
    const nkeys = await sList('notice:', true);
    const validN = WEEKS.map(w => 'notice:'+w.weekKey);
    for(const k of nkeys){
      if(!validN.includes(k)){ await sDelete(k, true); }
    }
    // 注意：lobby-announce、sports-list 不分週、永久保留，不可被這裡清掉。
  }

  function waitForFirebase(){
    return new Promise((resolve)=>{

      document.addEventListener('firebase-ready', ()=>resolve(), {once:true});
      // 保險：3秒後即使沒收到事件也嘗試繼續（避免卡死在載入畫面）
      setTimeout(()=>resolve(), 3000);
    });
  }

  // ---------- 畫面：老師檢視 ----------
  let teacherSelectedWeekIdx = 0;
  async function renderTeacher(readOnly){
    const myRenderToken = ++renderGen;
    const person = people.find(p=>p.id===currentPersonId);
    if(!person){ view='pickPerson'; return render(); }
    // peek 模式下 currentPersonId 仍是「正在偷看的成員」，viewingPerson 才是真正的老師本人資料來源
    const viewingPerson = readOnly ? (people.find(p=>p.isTeacher) || person) : person;
    const subtitle = readOnly ? '老師視角（唯讀預覽）' : '老師管理視角';

    const week = WEEKS[teacherSelectedWeekIdx];
    let sportsList;
    let fillState;

    // 撈這週所有人的回覆
    const allResp = {};
    for(const p of people){
      const key = 'resp:'+week.weekKey+':'+p.id;
      const r = await sGet(key, true);
      if(r) allResp[p.id] = r;
    }
    const teacherResp = allResp[viewingPerson.id] || {statuses:{}, note:''};
    const savedAnnounce = await sGet('announce:'+week.weekKey, true);
    const lobbyAnnounce = await sGet('lobby-announce', true);
    const weekNotice = await sGet('notice:'+week.weekKey, true);
    const noticeHtml = (weekNotice && weekNotice.text && weekNotice.text.trim())
      ? `<div class="notice-card">${escapeHtml(weekNotice.text)}<span class="notice-time">更新於 ${fmtDateTime(weekNotice.updatedAt)}</span></div>` : '';

    // 計算每天統計
    const dayStats = week.days.map(d=>{
      const freeList=[], busyList=[], maybeList=[], noAnswerList=[];
      people.forEach(p=>{
        if(p.isTeacher) return;
        const st = allResp[p.id] ? allResp[p.id].statuses[d.key] : null;
        if(st==='free') freeList.push(p);
        else if(st==='busy') busyList.push(p);
        else if(st==='maybe') maybeList.push(p);
        else noAnswerList.push(p);
      });
      const teacherStatus = teacherResp.statuses[d.key] || null;
      const teacherOk = teacherStatus === 'free' || teacherStatus === 'maybe';
      return { day:d, freeList, busyList, maybeList, noAnswerList, teacherStatus, teacherOk };
    });

    // 找出建議日：老師可以(free) 且 free人數最多
    let bestKey = null, bestScore = -1;
    dayStats.forEach(ds=>{
      if(ds.teacherStatus==='free'){
        const score = ds.freeList.length;
        if(score>bestScore){ bestScore=score; bestKey=ds.day.key; }
      }
    });

    let tabsHtml = '<div class="nav-tabs">';
    WEEKS.forEach((w,i)=>{
      const label = i===0 ? '本週' : (fmtShort(w.monday)+'週');
      tabsHtml += `<button data-idx="${i}" class="${i===teacherSelectedWeekIdx?'active':''}">${label}</button>`;
    });
    tabsHtml += '</div>';

    let subTabsHtml = `
      <div class="tabs-scroll-wrap">
        <div class="nav-tabs scroll">
          <button data-tab="summary" class="${teacherTab==='summary'?'active':''}">統計總覽</button>
          <button data-tab="fill" class="${teacherTab==='fill'?'active':''}">填寫我的時間</button>
          <button data-tab="announce" class="${teacherTab==='announce'?'active':''}">公告產生</button>
          <button data-tab="sports" class="${teacherTab==='sports'?'active':''}">運動興趣列表</button>
        </div>
      </div>
    `;

    let bodyHtml = '';
    if(teacherTab==='summary'){
      if(!readOnly){
        bodyHtml += `<h2>大廳公告</h2>`;
        bodyHtml += `<p class="desc">這則訊息會顯示在所有人「選擇身份」畫面的最上方。</p>`;
        bodyHtml += `<textarea class="note" id="lobbyAnnounceInput" placeholder="例如：下次運動時間是6/30 18:00 打籃球">${escapeHtml(lobbyAnnounce ? lobbyAnnounce.text||'' : '')}</textarea>`;
        bodyHtml += `<button class="save-btn" id="lobbySaveBtn">儲存大廳公告</button>`;
        bodyHtml += `<div class="save-flash" id="lobbySaveFlash"></div>`;
      }
      bodyHtml += `<h2 style="margin-top:24px;">${fmtShort(week.monday)} - ${fmtShort(week.days[4].date)} 統計</h2>`;
      if(!teacherResp.statuses || Object.keys(teacherResp.statuses).length===0){
        bodyHtml += `<p class="desc" style="color:var(--red);">${readOnly?'老師':'你'}尚未填寫這週的時間${readOnly?'':'，請切到「填寫我的時間」分頁'}。</p>`;
      }
      dayStats.forEach(ds=>{
        const isBest = ds.day.key === bestKey;
        const teacherBadge = ds.teacherStatus==='free' ? '<span class="badge best">老師可以</span>'
          : ds.teacherStatus==='maybe' ? '<span class="badge normal">老師不確定</span>'
          : ds.teacherStatus==='busy' ? '<span class="badge noteacher">老師沒空</span>'
          : '<span class="badge noteacher">老師未填</span>';
        bodyHtml += `
          <div class="summary-day ${isBest?'picked':''} ${!ds.teacherOk?'teacher-no':''}">
            <div class="summary-head">
              <div class="d">星期${ds.day.weekdayName} ${fmtShort(ds.day.date)} ${isBest?'（建議）':''}</div>
              ${teacherBadge}
            </div>
            <div class="summary-names">
              <b>有空 ${ds.freeList.length}</b>：
              ${ds.freeList.map(p=>`<span class="name-tag free">${escapeHtml(p.name)}</span>`).join('') || '—'}
              <br><b>不確定 ${ds.maybeList.length}</b>：
              ${ds.maybeList.map(p=>`<span class="name-tag maybe">${escapeHtml(p.name)}</span>`).join('') || '—'}
              <br><b>沒空 ${ds.busyList.length}</b>：
              ${ds.busyList.map(p=>`<span class="name-tag busy">${escapeHtml(p.name)}</span>`).join('') || '—'}
              ${ds.noAnswerList.length ? `<br><span style="color:#B6A88E;">尚未回覆：${ds.noAnswerList.map(p=>escapeHtml(p.name)).join('、')}</span>` : ''}
            </div>
          </div>
        `;
      });
      // 備註彙整
      const notes = people.filter(p=>!p.isTeacher).map(p=>{
        const r = allResp[p.id];
        return (r && r.note) ? {name:p.name, note:r.note} : null;
      }).filter(Boolean);
      if(notes.length){
        bodyHtml += `<div class="note-label">學員備註</div>`;
        notes.forEach(n=>{
          bodyHtml += `<div class="note-line">${escapeHtml(n.name)}：${escapeHtml(n.note)}</div>`;
        });
      }
    } else if(teacherTab==='fill'){
      // 老師填寫自己這週的可用時間（跟成員畫面邏輯相同，寫回同一份 resp 資料）
      bodyHtml += `<h2>${fmtShort(week.monday)} - ${fmtShort(week.days[4].date)}</h2>`;
      bodyHtml += readOnly
        ? `<p class="desc">老師這週的可用時間（唯讀）。</p>`
        : `<p class="desc">勾選每天的狀態，會作為排定運動的依據。</p>`;
      week.days.forEach(d=>{
        const cur = teacherResp.statuses[d.key] || '';
        bodyHtml += `
          <div class="day-row">
            <div class="day-label">星期${d.weekdayName}<span class="date">${fmtShort(d.date)}</span></div>
            <div class="status-options ${readOnly?'readonly':''}" data-day="${d.key}">
              ${STATUS_OPTS.map(o=>`<div class="status-btn ${readOnly&&cur===o.v?'active':''}" data-v="${o.v}" data-day="${d.key}">${o.label}</div>`).join('')}
            </div>
          </div>
        `;
      });
      bodyHtml += `<div class="note-label">備註（選填）</div>`;
      bodyHtml += `<textarea class="note" id="teacherNoteInput" placeholder="例如：這週想打羽球、或身體微恙先觀望…" ${readOnly?'readonly':''}>${escapeHtml(teacherResp.note||'')}</textarea>`;
      if(!readOnly){
        bodyHtml += `<button class="save-btn" id="teacherSaveBtn">儲存這週的回覆</button>`;
        bodyHtml += `<div class="save-flash" id="teacherSaveFlash"></div>`;
      }
    } else if(teacherTab==='announce'){
      if(!readOnly){
        bodyHtml += `<h2>本週注意事項</h2>`;
        bodyHtml += `<p class="desc">會顯示給所有人（含老師）在本週頁面最上方。</p>`;
        bodyHtml += `<textarea class="note" id="noticeInput" placeholder="例如：這週場地臨時更換，請留意 LINE 群組通知…">${escapeHtml(weekNotice ? weekNotice.text||'' : '')}</textarea>`;
        bodyHtml += `<button class="save-btn" id="noticeSaveBtn">儲存本週注意事項</button>`;
        bodyHtml += `<div class="save-flash" id="noticeSaveFlash"></div>`;
      }
      // 公告產生
      bodyHtml += `<h2 style="margin-top:24px;">產生公告</h2>`;
      if(!readOnly){
        bodyHtml += `<div class="field"><label>選擇日期</label><select id="announceDay">`;
        week.days.forEach(d=>{
          const ds = dayStats.find(x=>x.day.key===d.key);
          const sel = savedAnnounce && savedAnnounce.dayKey===d.key;
          bodyHtml += `<option value="${d.key}" ${sel?'selected':''}>星期${d.weekdayName} ${fmtShort(d.date)}（有空${ds.freeList.length}人）</option>`;
        });
        bodyHtml += `</select></div>`;
        bodyHtml += `<div class="field"><label>時間</label><input type="text" id="announceTime" placeholder="例如 19:00-20:00" value="${escapeHtml(savedAnnounce ? savedAnnounce.time||'' : '19:00-20:00')}"></div>`;
        bodyHtml += `<div class="field"><label>運動項目</label><input type="text" id="announceSport" placeholder="例如 羽毛球" value="${escapeHtml(savedAnnounce ? savedAnnounce.sport||'' : '')}"></div>`;
        bodyHtml += `<div class="field"><label>附加提醒（選填）</label><input type="text" id="announceExtra" placeholder="例如 請自備球拍" value="${escapeHtml(savedAnnounce ? savedAnnounce.extra||'' : '')}"></div>`;
        bodyHtml += `<button class="save-btn" id="genBtn">產生 / 更新公告文字</button>`;
      }
      if(!readOnly || savedAnnounce){
        bodyHtml += `<div class="note-label">公告文字${readOnly?'':'（可自行編輯後再複製）'}</div>`;
        bodyHtml += `<textarea class="announce-box" id="announceBox" ${readOnly?'readonly':''}>${savedAnnounce ? buildAnnounceText(savedAnnounce, dayStats) : '尚未產生公告，選好日期與運動後按上方按鈕。'}</textarea>`;
        bodyHtml += `<button class="copy-btn" id="copyBtn">複製公告(貼上line)</button>`;
        bodyHtml += `<div class="save-flash" id="copyFlash"></div>`;
      } else {
        bodyHtml += `<div class="empty">老師尚未產生公告</div>`;
      }
    } else if(teacherTab==='sports'){
      sportsList = await loadSportsList();
      bodyHtml = buildSportsListHtml(sportsList, person.id, !readOnly);
    }

    const showWeekPicker = teacherTab !== 'sports';

    if(myRenderToken !== renderGen) return;

    app.innerHTML = `
      <header class="top">
        <div class="brand"><span class="seed">●</span> 本週運動 <span class="seed">●</span></div>
        <div class="sub">${subtitle}</div>
      </header>
      <div class="card">
        ${subTabsHtml}
        ${showWeekPicker ? tabsHtml : ''}
        ${showWeekPicker ? noticeHtml : ''}
        ${bodyHtml}
      </div>
      <div class="footer-link"><a href="#" id="backLink">${readOnly ? '返回我的畫面' : '回到選擇身份'}</a></div>
    `;
    markScrollableTabs();

    function hasUnsavedFillChanges(){
      if(teacherTab !== 'fill' || readOnly || !fillState) return false;
      if(JSON.stringify(fillState) !== JSON.stringify(teacherResp.statuses||{})) return true;
      const noteEl = document.getElementById('teacherNoteInput');
      return !!noteEl && noteEl.value.trim() !== (teacherResp.note||'');
    }
    function confirmLeaveFill(){
      return !hasUnsavedFillChanges() || confirm('這週的勾選還沒儲存，離開會遺失變更，確定要離開嗎？');
    }

    app.querySelectorAll('.nav-tabs button[data-idx]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        if(!confirmLeaveFill()) return;
        teacherSelectedWeekIdx = parseInt(btn.dataset.idx,10);
        renderTeacher(readOnly);
      });
    });
    app.querySelectorAll('.nav-tabs button[data-tab]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        if(!confirmLeaveFill()) return;
        teacherTab = btn.dataset.tab;
        renderTeacher(readOnly);
      });
    });

    if(teacherTab==='summary' && !readOnly){
      document.getElementById('lobbySaveBtn').addEventListener('click', async ()=>{
        const text = document.getElementById('lobbyAnnounceInput').value.trim();
        await sSet('lobby-announce', {text, updatedAt: new Date().toISOString()}, true);
        const flash = document.getElementById('lobbySaveFlash');
        flash.textContent = '已儲存';
        setTimeout(()=>{ if(flash) flash.textContent=''; }, 2000);
      });
    }

    if(teacherTab==='announce' && !readOnly){
      document.getElementById('noticeSaveBtn').addEventListener('click', async ()=>{
        const text = document.getElementById('noticeInput').value.trim();
        await sSet('notice:'+week.weekKey, {text, updatedAt: new Date().toISOString()}, true);
        const flash = document.getElementById('noticeSaveFlash');
        flash.textContent = '已儲存';
        setTimeout(()=>{ if(flash) flash.textContent=''; }, 2000);
      });
    }

    if(teacherTab==='fill' && !readOnly){
      fillState = Object.assign({}, teacherResp.statuses);
      function refreshActive(){
        app.querySelectorAll('.status-btn').forEach(btn=>{
          const day = btn.dataset.day;
          btn.classList.toggle('active', fillState[day]===btn.dataset.v);
        });
      }
      refreshActive();
      app.querySelectorAll('.status-btn').forEach(btn=>{
        btn.addEventListener('click', ()=>{
          const day = btn.dataset.day;
          fillState[day] = btn.dataset.v;
          refreshActive();
        });
      });
      document.getElementById('teacherSaveBtn').addEventListener('click', async ()=>{
        const note = document.getElementById('teacherNoteInput').value.trim();
        await sSet('resp:'+week.weekKey+':'+viewingPerson.id, {statuses: fillState, note: note}, true);
        teacherResp.statuses = Object.assign({}, fillState);
        teacherResp.note = note;
        const flash = document.getElementById('teacherSaveFlash');
        flash.textContent = '已儲存';
        setTimeout(()=>{ if(flash) flash.textContent=''; }, 2000);
      });
    }

    if(teacherTab==='announce' && !readOnly){
      document.getElementById('genBtn').addEventListener('click', async ()=>{
        const dayKey = document.getElementById('announceDay').value;
        const time = document.getElementById('announceTime').value.trim();
        const sport = document.getElementById('announceSport').value.trim();
        const extra = document.getElementById('announceExtra').value.trim();
        const data = {dayKey, time, sport, extra, savedAt: new Date().toISOString()};
        await sSet('announce:'+week.weekKey, data, true);
        document.getElementById('announceBox').value = buildAnnounceText(data, dayStats);
      });
    }

    if(teacherTab==='announce' && (!readOnly || savedAnnounce)){
      document.getElementById('copyBtn').addEventListener('click', ()=>{
        const text = document.getElementById('announceBox').value;
        copyToClipboard(text);
        const flash = document.getElementById('copyFlash');
        flash.textContent = '已複製，貼到 LINE 群組吧';
        setTimeout(()=>{ if(flash) flash.textContent=''; }, 2500);
      });
    }

    if(teacherTab==='sports'){
      wireSportsListHandlers(sportsList, person.id, !readOnly, ()=>renderTeacher(readOnly));
    }

    document.getElementById('backLink').addEventListener('click', (e)=>{
      e.preventDefault();
      if(!confirmLeaveFill()) return;
      if(readOnly){
        view = 'member';
      } else {
        currentPersonId = null;
        view = 'pickPerson';
      }
      render();
    });
  }

  function buildAnnounceText(data, dayStats){
    const ds = dayStats.find(x=>x.day.key===data.dayKey);
    const dateLabel = ds ? `${fmtShort(ds.day.date)}（週${ds.day.weekdayName}）` : '';
    let text = `本週運動公告\n`;
    text += `日期：${dateLabel}\n`;
    if(data.time) text += `時間：${data.time}\n`;
    text += `運動：${data.sport || '（未填）'}\n`;
    if(data.extra) text += `備註：${data.extra}\n`;
    text += `請大家準時參加！`;
    return text;
  }

  function copyToClipboard(text){
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).catch(()=>{ fallbackCopy(text); });
    } else {
      fallbackCopy(text);
    }
  }
  function fallbackCopy(text){
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta);
    ta.select();
    try{ document.execCommand('copy'); }catch(e){}
    document.body.removeChild(ta);
  }

  // ---------- 運動興趣列表（成員、老師視角共用） ----------
  let expandedSportVotes = new Set(); // 只是 UI 展開/收合狀態，不是資料

  async function loadSportsList(){
    return (await sGet('sports-list', true)) || [];
  }
  async function saveSportsList(list){
    await sSet('sports-list', list, true);
  }
  function sportVoteCount(item){
    return item.votes ? Object.keys(item.votes).length : 0;
  }
  function sortedSportsList(list){
    return [...list].sort((a,b)=> sportVoteCount(b)-sportVoteCount(a) || a.createdAt.localeCompare(b.createdAt));
  }
  function personName(id){
    const p = people.find(x=>x.id===id);
    return p ? p.name : '(已離開的成員)';
  }

  function buildSportsListHtml(list, currentPersonId, isTeacherNow){
    const sorted = sortedSportsList(list);
    let html = `
      <h2>運動興趣列表</h2>
      <p class="desc">新增想玩的運動、投票「+1 有興趣」，也可以留言討論。</p>
      <div class="add-row">
        <input type="text" id="newSportName" placeholder="輸入想加的運動項目">
        <button id="addSportBtn">新增</button>
      </div>
    `;
    if(!sorted.length){
      html += `<div class="empty">目前還沒有人新增運動項目</div>`;
    }
    sorted.forEach(item=>{
      const voteCount = sportVoteCount(item);
      const votedByMe = !!(item.votes && item.votes[currentPersonId]);
      const canDelete = isTeacherNow || item.createdBy === currentPersonId;
      const expanded = expandedSportVotes.has(item.id);
      let votersHtml = '';
      if(expanded){
        const names = Object.keys(item.votes||{}).map(personName);
        votersHtml = `<div class="summary-names">${names.length ? names.map(n=>`<span class="name-tag free">${escapeHtml(n)}</span>`).join('') : '目前還沒有人投票'}</div>`;
      }
      const commentsHtml = (item.comments||[]).map(c=>{
        const canDeleteComment = isTeacherNow || c.personId === currentPersonId;
        return `<div class="note-line">
          <span class="note-line-text">${escapeHtml(personName(c.personId))}：${escapeHtml(c.text)}</span>
          <span class="note-line-meta"><span class="comment-time">${fmtDateTime(c.createdAt)}</span>${canDeleteComment ? `<button class="del-btn" data-delete-comment="${item.id}:${c.id}">刪除</button>` : ''}</span>
        </div>`;
      }).join('');
      html += `
        <div class="summary-day sport-item">
          <div class="sport-head">
            <div class="sport-title-row">
              <span class="sport-name">${escapeHtml(item.name)}</span>
              <span class="pill" data-vote-toggle="${item.id}" style="cursor:pointer;">${voteCount} 人有興趣</span>
            </div>
            <div class="sport-meta">
              由 ${escapeHtml(personName(item.createdBy))} 新增
              ${canDelete ? `<button class="del-btn" data-delete-sport="${item.id}">刪除</button>` : ''}
            </div>
          </div>
          <div class="sport-actions">
            <div class="status-btn ${votedByMe?'active':''}" data-v="free" data-vote="${item.id}">+1 有興趣</div>
          </div>
          ${votersHtml}
          <div class="sport-comments">
            ${commentsHtml}
            <div class="add-row">
              <input type="text" data-comment-for="${item.id}" placeholder="我有話想說…">
              <button data-comment-submit="${item.id}">送出</button>
            </div>
          </div>
        </div>
      `;
    });
    return html;
  }

  function wireSportsListHandlers(list, currentPersonId, isTeacherNow, rerenderFn){
    async function addSport(){
      const input = document.getElementById('newSportName');
      const name = input.value.trim();
      if(!name) return;
      list.push({
        id:'sp'+Date.now(), name, createdBy:currentPersonId, createdAt:new Date().toISOString(),
        votes:{}, comments:[]
      });
      await saveSportsList(list);
      rerenderFn();
    }
    document.getElementById('addSportBtn').addEventListener('click', addSport);
    document.getElementById('newSportName').addEventListener('keydown', (e)=>{
      if(e.key === 'Enter') addSport();
    });
    app.querySelectorAll('[data-vote-toggle]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const id = btn.dataset.voteToggle;
        if(expandedSportVotes.has(id)) expandedSportVotes.delete(id);
        else expandedSportVotes.add(id);
        rerenderFn();
      });
    });
    app.querySelectorAll('[data-vote]').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        const item = list.find(x=>x.id===btn.dataset.vote);
        if(!item) return;
        item.votes = item.votes || {};
        if(item.votes[currentPersonId]) delete item.votes[currentPersonId];
        else item.votes[currentPersonId] = true;
        await saveSportsList(list);
        rerenderFn();
      });
    });
    app.querySelectorAll('[data-delete-sport]').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        if(!confirm('確定要刪除這個運動項目嗎？')) return;
        const idx = list.findIndex(x=>x.id===btn.dataset.deleteSport);
        if(idx>=0){ list.splice(idx,1); await saveSportsList(list); rerenderFn(); }
      });
    });
    app.querySelectorAll('[data-delete-comment]').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        const [itemId, commentId] = btn.dataset.deleteComment.split(':');
        const item = list.find(x=>x.id===itemId);
        if(!item || !item.comments) return;
        const idx = item.comments.findIndex(c=>c.id===commentId);
        if(idx>=0){ item.comments.splice(idx,1); await saveSportsList(list); rerenderFn(); }
      });
    });
    async function submitComment(itemId){
      const item = list.find(x=>x.id===itemId);
      if(!item) return;
      const input = app.querySelector(`[data-comment-for="${itemId}"]`);
      const text = input.value.trim();
      if(!text) return;
      item.comments = item.comments || [];
      item.comments.push({id:'c'+Date.now(), personId:currentPersonId, text, createdAt:new Date().toISOString()});
      await saveSportsList(list);
      rerenderFn();
    }
    app.querySelectorAll('[data-comment-submit]').forEach(btn=>{
      btn.addEventListener('click', ()=>submitComment(btn.dataset.commentSubmit));
    });
    app.querySelectorAll('[data-comment-for]').forEach(input=>{
      input.addEventListener('keydown', (e)=>{
        if(e.key === 'Enter') submitComment(input.dataset.commentFor);
      });
    });
  }

  // ---------- 畫面：管理入口 ----------
  let adminUnlocked = false;

  function renderAdminLock(){
    if(adminUnlocked) return renderAdminPanel();
    app.innerHTML = `
      <header class="top">
        <div class="brand"><span class="seed">●</span> 本週運動 <span class="seed">●</span></div>
        <div class="sub">管理入口</div>
      </header>
      <div class="card admin-lock">
        <h1>請輸入管理密碼</h1>
        <div class="field" style="margin-top:16px;">
          <input type="password" id="pwInput" placeholder="密碼">
        </div>
        <button class="save-btn" id="pwSubmit">進入管理</button>
        <div class="save-flash" id="pwFlash"></div>
      </div>
      <div class="footer-link"><a href="#" id="backLink">回到選擇身份</a></div>
    `;
    document.getElementById('pwSubmit').addEventListener('click', async ()=>{
      const val = document.getElementById('pwInput').value;
      const hash = await sha256Hex(val);
      if(hash === ADMIN_PASSWORD_HASH){
        adminUnlocked = true;
        renderAdminPanel();
      } else {
        document.getElementById('pwFlash').textContent = '密碼錯誤';
      }
    });
    document.getElementById('backLink').addEventListener('click', (e)=>{
      e.preventDefault();
      view='pickPerson'; render();
    });
  }

  function renderAdminPanel(){
    let rowsHtml = people.map(p=>`
      <div class="admin-row">
        <div>${escapeHtml(p.name)} ${p.isTeacher?'<span class="pill">老師</span>':''}
          <div style="font-size:11px; color:var(--ink-soft); margin-top:2px;">${p.password ? '已設定密碼' : '尚未設定密碼'}</div>
        </div>
        <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:flex-end;">
          <button class="del-btn" data-action="setTeacher" data-id="${p.id}">${p.isTeacher?'取消老師':'設為老師'}</button>
          ${p.password ? `<button class="del-btn" data-action="resetPw" data-id="${p.id}">重設密碼</button>` : ''}
          <button class="del-btn" data-action="delete" data-id="${p.id}">刪除</button>
        </div>
      </div>
    `).join('');

    app.innerHTML = `
      <header class="top">
        <div class="brand"><span class="seed">●</span> 本週運動 <span class="seed">●</span></div>
        <div class="sub">管理人員名單</div>
      </header>
      <div class="card">
        <h1>人員管理</h1>
        <p class="desc">新增成員、指定老師。老師的空閒時間會作為排定運動的依據。</p>
        ${rowsHtml || '<div class="empty">尚無人員</div>'}
        <div class="add-row">
          <input type="text" id="newName" placeholder="輸入新成員姓名">
          <button id="addBtn">新增</button>
        </div>
      </div>
      <div class="footer-link"><a href="#" id="backLink">回到選擇身份</a></div>
    `;

    app.querySelectorAll('[data-action="delete"]').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        if(!confirm('確定要刪除這位成員嗎？')) return;
        people = people.filter(p=>p.id!==btn.dataset.id);
        await savePeople();
        renderAdminPanel();
      });
    });
    app.querySelectorAll('[data-action="setTeacher"]').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        const id = btn.dataset.id;
        people = people.map(p=>({...p, isTeacher: p.id===id ? !p.isTeacher : false}));
        await savePeople();
        renderAdminPanel();
      });
    });
    app.querySelectorAll('[data-action="resetPw"]').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        const id = btn.dataset.id;
        const p = people.find(x=>x.id===id);
        if(!confirm(`確定要重設 ${p.name} 的密碼嗎？對方下次登入時會需要重新設定新密碼。`)) return;
        people = people.map(x=> x.id===id ? {...x, password:''} : x);
        await savePeople();
        renderAdminPanel();
      });
    });
    document.getElementById('addBtn').addEventListener('click', async ()=>{
      const input = document.getElementById('newName');
      const name = input.value.trim();
      if(!name) return;
      const id = 'p' + Date.now();
      people.push({id, name, isTeacher:false, password:''});
      await savePeople();
      renderAdminPanel();
    });
    document.getElementById('backLink').addEventListener('click', (e)=>{
      e.preventDefault();
      adminUnlocked = false;
      view='pickPerson'; render();
    });
  }

  init();
})();
</script>
</body>
</html>
